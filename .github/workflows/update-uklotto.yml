name: Update UK Lotto results
on:
  schedule:
    - cron: '30 22 * * 3,6'   # Wed & Sat 22:30 UTC, after the ~20:00 UK draw
    - cron: '30 7 * * 4,0'    # Thu & Sun 07:30 UTC, safety re-check
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/update_uklotto.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet uklotto_recent.json; then
            git config user.name "uklotto-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add uklotto_recent.json
            git commit -m "Auto-update UK Lotto results"
            git push
          else
            echo "No change."
          fi
